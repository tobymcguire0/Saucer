server {
    listen 80;
    server_name api.tobymcguire.net;

    # Allow certbot ACME challenge through before redirecting
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.tobymcguire.net;

    ssl_certificate /etc/letsencrypt/live/api.tobymcguire.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tobymcguire.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
