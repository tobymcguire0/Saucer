services:
  db:
    image: postgres:18
    container_name: saucer_db
    restart: unless-stopped
    user: postgres
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    container_name: saucer_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: db
    ports:
      - "3001:3001"

volumes:
  postgres_data:
